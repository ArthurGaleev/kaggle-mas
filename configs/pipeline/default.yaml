phases:
  - name: "data_profiling"
    agent: "DataAgent"
    timeout: 180
    retries: 2
  - name: "data_cleaning"
    agent: "DataAgent"
    timeout: 240
    retries: 2
  - name: "feature_engineering"
    agent: "FeatureAgent"
    timeout: 480
    retries: 3
  - name: "model_training"
    agent: "ModelAgent"
    timeout: 1200
    retries: 2
  - name: "evaluation"
    agent: "EvaluatorAgent"
    timeout: 300
    retries: 1
  - name: "feedback_loop"
    agent: "OrchestratorAgent"
    timeout: 180
    retries: 1
