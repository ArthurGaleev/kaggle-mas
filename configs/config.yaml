defaults:
  - _self_
  - llm: openrouter
  - pipeline: default

project:
  name: "kaggle-mas-rental"
  seed: 42
  data_dir: "./data"
  output_dir: "./outputs"
  log_dir: "./logs"
  competition: "mws-ai-agents-2026"

pipeline:
  max_feedback_loops: 3
  # Target OOF MSE threshold (raw price scale) to trigger ACCEPT in the
  # feedback loop. Current best leaderboard score is ~9274.76, so the
  # OOF threshold is set conservatively below that. 1500.0 was unreachable
  # and caused the orchestrator to always exhaust max_feedback_loops.
  target_mse_threshold: 8000.0
  cv_folds: 5
  test_size: 0.2
  enable_rag: true
  enable_guardrails: true
  enable_monitoring: true

models:
  lightgbm:
    enabled: true
    params:
      n_estimators: 2000
      learning_rate: 0.03
      max_depth: 8
      num_leaves: 127
      subsample: 0.8
      colsample_bytree: 0.7
      reg_alpha: 0.05
      reg_lambda: 0.1
      min_child_samples: 20
      early_stopping_rounds: 100
      device: gpu           # GPU acceleration; ModelAgent falls back to cpu if no GPU
  xgboost:
    enabled: true
    params:
      n_estimators: 2000
      learning_rate: 0.03
      max_depth: 8
      subsample: 0.8
      colsample_bytree: 0.7
      reg_alpha: 0.05
      reg_lambda: 0.1
      early_stopping_rounds: 100
      device: cuda          # XGBoost >=2.0 GPU; ModelAgent selects gpu_hist for older versions
  catboost:
    enabled: true
    params:
      iterations: 2000
      learning_rate: 0.03
      depth: 8
      l2_leaf_reg: 3
      early_stopping_rounds: 100
      verbose: 200
      task_type: GPU        # GPU acceleration; ModelAgent falls back to CPU if no GPU

guardrails:
  max_input_rows: 500000
  max_features: 300
  max_target_value: 100000
  min_target_value: 0
  max_missing_ratio: 0.95
  max_cardinality: 1000
  allowed_dtypes: ["int64", "float64", "object", "datetime64"]
  max_inference_time_seconds: 300
  input_validation: true
  output_validation: true

monitoring:
  log_level: "INFO"
  track_token_usage: true
  track_latency: true
  track_memory: true
  save_artifacts: true

rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  knowledge_base_path: "./rag/knowledge_base"
